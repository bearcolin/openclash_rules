;不要随意改变关键字，否则会导致出错
;acl4SSR规则
;==================================================================
; 20260607 organized-groups / 窄屏短名称版
; 基于 20260605-postwar-rebuild.ini，整理目标：
;  1. 用 短名称区分面板分组，适配 OpenClash 窄屏显示
;  2. 删除韩国节点组及所有韩国选项
;  3. 删除「🤖 AI美国」混合组，Claude/OpenAI/Copilot/Gemini 统一归入 🇺🇲 AI
;  4. [服务🇺🇲] 默认 🕹️ 手动切换；[服务🌏] 默认 ♻️ 自动选择；[服务🇨🇳] 默认 DIRECT
;  5. ♻️ 自动选择 不包含 DMIT-IPv6-Direct-IP 和 LA01-US-Rt-smoaapkuc；DMIT 直连只通过 🕹️ 手动切换使用
;  6. CF WS+TLS 备用节点通过 ☁️ CF备用 暴露，并可出现在节点选择、手动切换、自动选择里
;==================================================================

;去广告：支持
;自动测速：支持
;微软分流：支持
;苹果分流：支持
;增强中国IP段：支持
;增强国外GFW：支持


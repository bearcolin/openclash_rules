;acl4SSR规则
;==================================================================
; 20260605 postwar-rebuild / 战后重建版
; 基于 rules.candytally.ini，改动如下：
;  1. 新增「🤖 AI美国」fallback 组：DMIT 主用 → 机场美国兜底（AI 不再单点）
;  2. Claude + OpenAI(Codex) 强制走「🤖 AI美国」（原 Claude 在 AI1、OpenAI 是注释的）
;  3. 「🚀 节点选择」默认改为狮城优先，普通流量自动走机场港新（绕开机场美国慢）
;  4. DMIT 节点名需含「DMIT」才能被 AI美国组匹配，导入后请核对节点名
;==================================================================

;去广告：支持
;自动测速：支持
;微软分流：支持
;苹果分流：支持
;增强中国IP段：支持
;增强国外GFW：支持

